<html>
<head>
<title>Running</title>
<link rel="stylesheet" href="./public/styleRunner.css">
</head>
<body>
	<div class="container">
		<div class="help-space">Press spacebar to start/jump </div>
		<div class="scoreText">                            Score:0 </div>
		<div class="timeText">                            Time:0 </div>
        <div class="game">
            <div class="hero">
                <img src="./public/hero.gif" alt="">
            </div>
            <div class="vilan">
                <img src="./public/ghost.gif" alt="">
            </div>
            <div class="pursuer">
                <img src="./public/monster2.gif" alt="">
            </div>
            <div class="line-heart">
                <div class="heart0">
                    <img src="./public/heart.png" alt="heart">
                </div>
                <div class="heart1">
                    <img src="./public/heart.png" alt="heart">
                </div>
                <div class="heart2">
                    <img src="./public/heart.png" alt="heart">
                </div>
                <div class="heart3">
                    <img src="./public/heart.png" alt="heart">
                </div>
            </div>
            <div class="tomb">
                <img src="./public/tomb.png" alt="tomb">
            </div>
        </div>
	</div>
	<script src="./public/src/running.js">
	</script>
</body>
</html>
